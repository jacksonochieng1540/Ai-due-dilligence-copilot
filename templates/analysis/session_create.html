{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}New Due Diligence Session{% endblock %}
{% block content %}
<h2>Start a New Due Diligence Session</h2>
<p class="text-muted">Pick the company name and select which uploaded documents belong to it.</p>
<form method="post">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary mt-2">Create Session</button>
</form>
{% endblock %}
